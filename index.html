<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FFMPEG</title>
    <script src="ffmpegWasmBarebones.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #ffffff; 
            --text: #e0e0e0;
            --dim: #666666;
            --border: #222222;
            --cmd-text: #00ff00;
            --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--mono); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 15px; }
        .card { background-color: var(--card); border: 1px solid var(--border); padding: 24px; position: relative; }
        .label { font-size: 10px; color: var(--dim); margin-bottom: 15px; display: block; letter-spacing: 2px; text-transform: uppercase; border-left: 2px solid var(--accent); padding-left: 10px; }
        .status-box { font-size: 11px; color: var(--accent); padding: 12px; background: #000; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; }
        #cmd-input { width: 100%; background: #000; color: var(--cmd-text); border: 1px solid var(--border); padding: 15px; font-family: var(--mono); font-size: 14px; outline: none; }
        .btn-main { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; cursor: pointer; font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; }
        .btn-main:hover { filter: brightness(1.1); }
        .btn-main:disabled { background: var(--dim); cursor: not-allowed; }
        .btn-secondary { padding: 10px; font-size: 11px; }
        #log-container { margin-top: 10px; height: 220px; background: #000; border: 1px solid var(--border); padding: 12px; overflow-y: auto; font-size: 11px; color: #888; line-height: 1.6; }
        .log-entry { border-bottom: 1px solid #111; padding: 4px 0; word-break: break-all; white-space: pre-wrap; }
        .log-success { color: #55ff55; }
        .log-error { color: #ff4444; }
        #log-container::-webkit-scrollbar { width: 6px; }
        #log-container::-webkit-scrollbar-track { background: #000; }
        #log-container::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <span class="label">Step 01 / File System</span>
        <div class="status-box">
            <span>FS: <span id="status-tag" style="color: #666;">OFFLINE</span></span>
            <span id="progress-text">IDLE</span>
        </div>
        <button id="auth-btn" class="btn-main btn-secondary">Mount Local Directory</button>
    </div>

    <div class="card">
        <span class="label">Step 02 / Command</span>
        <input type="text" id="cmd-input" spellcheck="false" value="ffmpeg -i input.mp4 output.mkv">
    </div>

    <div class="card">
        <span class="label">Step 03 / Terminal</span>
        <button id="start-btn" class="btn-main" disabled>Execute Transcode</button>
        <div id="log-container"></div>
    </div>
</div>

<script>
    const FFMPEG_CORE_URL = document.location.origin + document.location.pathname + "./ffmpeg-core/ffmpeg-core.js";
    const FFMPEG_WASM_URL = document.location.origin + document.location.pathname + "./ffmpeg-core/ffmpeg-core.wasm";
    
    let ffmpegCoreAPI = undefined;
    let directoryHandle = null;
    let isCoreLoaded = false;

    const dom = {
        auth: document.getElementById('auth-btn'),
        start: document.getElementById('start-btn'),
        status: document.getElementById('status-tag'),
        progress: document.getElementById('progress-text'),
        cmd: document.getElementById('cmd-input'),
        logs: document.getElementById('log-container')
    };

    const appendLog = (msg, type = 'info') => {
        const el = document.createElement('div');
        el.className = `log-entry ${type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '')}`;
        el.textContent = `[${new Date().toLocaleTimeString()}] > ${msg}`;
        dom.logs.appendChild(el);
        dom.logs.scrollTop = dom.logs.scrollHeight;
    };

    const parseCommand = (cmd) => {
        const parts = cmd.match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g);
        return parts.map(p => p.replace(/^["']|["']$/g, '')).filter(p => p !== 'ffmpeg');
    };

    (async function initSystem() {
        try {
            dom.progress.textContent = "CORE_LOADING";
            appendLog("Initializing FFmpeg WASM Core...");
            
            ffmpegCoreAPI = await loadFFmpegCoreAPI({
                coreURL: FFMPEG_CORE_URL,
                wasmURL: FFMPEG_WASM_URL,
                onLog: (l) => appendLog(l.message),
                onProgress: (p) => {
                    dom.progress.textContent = `LOAD: ${(p.progress * 100).toFixed(0)}%`;
                }
            });

            isCoreLoaded = true;
            dom.progress.textContent = "READY";
            appendLog("Core loaded successfully.", "success");
            if (directoryHandle) dom.start.disabled = false;
        } catch (err) {
            appendLog(`Core Init Failed: ${err.message}`, "error");
            dom.progress.textContent = "CORE_ERR";
        }
    })();

    dom.auth.onclick = async () => {
        try {
            directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            dom.status.textContent = `ONLINE / ${directoryHandle.name.toUpperCase()}`;
            dom.status.style.color = "var(--cmd-text)";
            if (isCoreLoaded) dom.start.disabled = false;
            appendLog(`Directory "${directoryHandle.name}" mounted.`);
        } catch (err) {
            appendLog("Mount failed.", "error");
        }
    };

    dom.start.onclick = async () => {
        const cmdValue = dom.cmd.value.trim();
        if (!cmdValue || !directoryHandle || !isCoreLoaded) return;

        dom.start.disabled = true;
        try {
            const currentFS = await ffmpegCoreAPI("FS.readdir", ["/"]);
            for (const f of currentFS) {
                if (!["current_dir", ".", "..", "tmp", "dev", "proc"].includes(f)) {
                    try { await ffmpegCoreAPI("FS.unlink", [f]); } catch(e) {}
                }
            }

            const args = parseCommand(cmdValue);
            for (const arg of args) {
                if (arg.includes('.') && !arg.startsWith('-')) {
                    try {
                        const fileHandle = await directoryHandle.getFileHandle(arg);
                        const file = await fileHandle.getFile();
                        const buffer = await file.arrayBuffer();
                        await ffmpegCoreAPI("FS.writeFile", [arg, new Uint8Array(buffer)]);
                        appendLog(`Syncing: ${arg}`);
                    } catch (e) {
                        if (arg === args[args.length - 1]) continue;
                        appendLog(`Warning: File "${arg}" not found in directory.`, "error");
                    }
                }
            }

            dom.progress.textContent = "PROCESSING";
            await ffmpegCoreAPI("setTimeout", [-1]);

            try {
                await ffmpegCoreAPI("exec", args);
            } catch (execErr) {
                if (execErr.message.includes("Aborted") || execErr.message.includes("undefined")) {
                    appendLog("Process exit signal captured.");
                } else {
                    throw execErr;
                }
            }
            
            dom.progress.textContent = "SYNCING";
            const fsFiles = await ffmpegCoreAPI("FS.readdir", ["/"]);
            let savedCount = 0;

            for (const f of fsFiles) {
                if (["current_dir", ".", "..", "tmp", "dev", "proc"].includes(f)) continue;
                const isInput = args.some((arg, i) => arg === f && (i === 0 || args[i-1] === '-i'));
                
                if (!isInput) {
                    try {
                        const data = await ffmpegCoreAPI("FS.readFile", [f]);
                        const newFileHandle = await directoryHandle.getFileHandle(f, { create: true });
                        const writable = await newFileHandle.createWritable();
                        await writable.write(data.buffer);
                        await writable.close();
                        appendLog(`Saved: ${f}`, "success");
                        await ffmpegCoreAPI("FS.unlink", [f]);
                        savedCount++;
                    } catch (e) {}
                }
            }

            dom.progress.textContent = savedCount > 0 ? "FINISHED" : "NO_OUTPUT";

        } catch (err) {
            appendLog(`Error: ${err.message}`, "error");
            dom.progress.textContent = "ERROR";
        } finally {
            try { await ffmpegCoreAPI("reset"); } catch(e) {}
            dom.start.disabled = false;
        }
    };
</script>
</body>
</html>
